name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS
            os: macos-14
            command: npx electron-builder --mac --arm64
            artifact: qplayer-macos
            files: |
              dist/*.dmg
              dist/*.dmg.blockmap
          - name: Windows
            os: windows-latest
            command: npm run dist:win
            artifact: qplayer-windows
            files: |
              dist/*.exe
              dist/*.exe.blockmap

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify bundled Windows mpv
        if: matrix.platform.name == 'Windows'
        shell: pwsh
        run: |
          $mpv = Get-Item vendor/mpv/win-x64/mpv.exe
          if ($mpv.Length -lt 100MB) {
            throw "Bundled mpv.exe is too small. Git LFS files were not pulled."
          }

      - name: Build package
        run: ${{ matrix.platform.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact }}
          path: ${{ matrix.platform.files }}
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name, '-') }}
          files: release-assets/**/*
